            return new Promise((resolve) => {

                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = 400 / img.width;
                        canvas.width = 400;
                        canvas.height = img.height * scaleSize;

                        if (currentRooms.some(r => String(r.id) === String(roomId))) {
                            return showToast("غرفة بنفس المعرف موجودة مسبقاً", "error");
                        }
                        updatedRooms = [...currentRooms, roomData];
                    }

                    await updateDoc(sectionRef, { rooms: updatedRooms });

                    // إنشاء document مستقل للغرفة يتيح subcollections (messages, state)
                    await setDoc(doc(db, 'rooms', roomId), {
                        id: roomId, name: roomData.name, sectionId: roomData.sectionId, _isRoomDoc: true
                    }, { merge: true });

                    showToast(isEditingRoom ? "تم تحديث بيانات الغرفة بنجاح 🛠️" : "تم إنشاء الغرفة الجديدة بنجاح 🎉", "success");
                } catch (e) {
                    console.error(e);
                    showToast("حدث خطأ أثناء الاتصال: " + (e.message || e.code || ''), "error");
                }
                cancelEditRoom();
            };

            const handleAddRootAccount = async () => {
                if (!newRootAccount.username || !newRootAccount.password) return showToast("الاسم وكلمة المرور مطلوبة لحساب الروت", "warning");

                const cleanQuotas = {};
                for (const [roomId, quota] of Object.entries(newRootAccount.roomQuotas)) {
                    const q = parseInt(quota);
                    if (q > 0) cleanQuotas[roomId] = q;
                }
                if (Object.keys(cleanQuotas).length === 0) return showToast("يجب إعطاء الروت حصة في غرفة واحدة على الأقل", "warning");

                try {
                    await addDoc(getColRef('root_accounts'), {
                        username: newRootAccount.username, password: newRootAccount.password,
                        role: 'Root', roomQuotas: cleanQuotas, addedAt: Date.now(), addedBy: displayAppName
                    });
                    showToast(`تم إنشاء حساب الروت وتوزيع حصصه بنجاح ✅`, "success");
                    setNewRootAccount({ username: '', password: '', roomQuotas: {} });

                    showToast("فشل إنشاء حساب الروت", "error");

            const handleDeleteRoom = (room, sectionId) => {

                    try {
                        const section = sections.find(s => String(s.id || s.docId) === String(sectionId));
                        if (!section) return showToast("القسم غير موجود", "error");

                        const secDocId = section.docId || (section.isSection ? `sec_${section.id}` : String(section.id));
                        const sectionRef = doc(db, 'rooms', secDocId);
                        const sectionSnap = await getDoc(sectionRef);

                        if (sectionSnap.exists() && Array.isArray(sectionSnap.data().rooms)) {
                            const updatedRooms = sectionSnap.data().rooms.filter(r => String(r.id) !== String(room.id));
                            await updateDoc(sectionRef, { rooms: updatedRooms });
                        }
                        // حذف document الغرفة المستقل إن وجد
                        await deleteDoc(doc(db, 'rooms', String(room.id))).catch(() => {});
                        showToast(`تم مسح الغرفة نهائياً 🗑️`, "success");
                    } catch (e) { console.error(e); showToast("فشل الحذف", "error"); }
                }, true);
            };

            const updateRoomStatus = async (sectionId, roomId, newStatus) => {
                try {
                    const section = sections.find(s => String(s.id || s.docId) === String(sectionId));
                    if (!section) return showToast("القسم غير موجود", "error");

                    const secDocId = section.docId || (section.isSection ? `sec_${section.id}` : String(section.id));
                    const sectionRef = doc(db, 'rooms', secDocId);
                    const sectionSnap = await getDoc(sectionRef);

                    if (sectionSnap.exists() && Array.isArray(sectionSnap.data().rooms)) {
                        const updatedRooms = sectionSnap.data().rooms.map(r =>
                            String(r.id) === String(roomId) ? { ...r, status: newStatus } : r
                        );
                        await updateDoc(sectionRef, { rooms: updatedRooms });
                    }
                    showToast("تم تحديث حالة الغرفة بنجاح 🔄", "success");
                } catch (e) { console.error(e); showToast("فشل تحديث الحالة", "error"); }
            };

            const handleSaveSection = async () => {
                if (!newSection.name) return showToast("اسم القسم مطلوب", "error");
                try {
                    if (isEditingSection && newSection.id) {
                        // تعديل: تحديث اسم/علم القسم مع الحفاظ على الغرف
                        const secDocId = newSection.docId || `sec_${newSection.id}`;
                        await updateDoc(doc(db, 'rooms', secDocId), { name: newSection.name, flag: newSection.flag || '🚩' });
                        showToast("تم تعديل بيانات القسم 📁", "success");
                        setIsEditingSection(false);
                    } else {
                        const id = String(Date.now());
                        const secDocId = `sec_${id}`;
                        // ✅ إنشاء القسم مع rooms[] array فارغ — هذا هو الهيكل الصحيح لـ Flutter
                        await setDoc(doc(db, 'rooms', secDocId), {
                            id: id, isSection: true, name: newSection.name, flag: newSection.flag || '🚩', rooms: []
                        });
                        showToast("تم إضافة القسم الجديد بنجاح 🎉", "success");
                    }
                    setNewSection({ id: null, docId: null, name: '', flag: '🇯🇴' });
                } catch (e) { showToast("حدث خطأ", "error"); console.error(e); }
            };

            const handleDeleteSection = (secId) => {
                openConfirmDialog("حذف القسم", "⚠️ سيتم حذف هذا القسم مع جميع الغرف بداخله، هل تريد الاستمرار؟", async () => {
                    try {
                        const section = sections.find(s => String(s.id || s.docId) === String(secId));
                        const secDocId = section ? (section.docId || `sec_${section.id}`) : `sec_${secId}`;
                        const sectionRef = doc(db, 'rooms', secDocId);
                        const sectionSnap = await getDoc(sectionRef);
                        const batch = writeBatch(db);
                        // حذف documents الغرف المستقلة
                        if (sectionSnap.exists() && Array.isArray(sectionSnap.data().rooms)) {
                            sectionSnap.data().rooms.forEach(r => batch.delete(doc(db, 'rooms', String(r.id))));
                        }
                        // حذف document القسم نفسه
                        batch.delete(sectionRef);
                        await batch.commit();
                        showToast("تم حذف القسم بكامله 🗑️", "success");

            const startEditSection = (sec) => {

                    { id: 'dummy_3', name: 'ذيب الليل', role: 'Member', roomId: 'room102', deviceId: 'ip_172.16.0.8', lastSeen: Date.now() - 60000, badge: '🐺', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Wolf' },
                    { id: 'dummy_4', name: 'مهندس طيران', role: 'Member', roomId: defaultRoomId, deviceId: 'ip_8.8.8.8', lastSeen: Date.now() - 10000, badge: '✈️', customNameColor: '#0000ff', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Eng' }
                ];
                try {
                    const batch = writeBatch(db);
                    dummyUsers.forEach(u => {
                        const ref = getDocRef('room_members', u.id);
                        batch.set(ref, u);
                    });
                    await batch.commit();
                    showToast("تم إضافة مستخدمين وهميين بنجاح! 🧪", "success");
                } catch (e) { showToast("فشل إضافة المستخدمين", "error"); }
            };

            // ==========================================
            // 🚀 هندسة التوجيه الذكي والشاشات (Rendering) 🚀
            // ==========================================

            if (!isReady) return <div className="flex h-[100dvh] items-center justify-center bg-slate-900"><Loader2 className="animate-spin text-indigo-500" size={48} /></div>;

            // 1. شاشة الموت لجميع المستخدمين والزبائن (تظهر فوراً وتقفل التطبيق تماماً)
            if (isGlobalSystemKilled && !isCentralOwnerApp) {
                return (
                    <div className="bg-black h-[100dvh] w-full flex items-center justify-center relative overflow-hidden" dir="rtl">

                                        <div className="p-3 bg-white border-t border-slate-200 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] flex gap-2 shrink-0">
                                            <input
                                                type="text"
                                                id="ghostMsgInput"
                                                placeholder="إرسال إعلان للغرفة كإدارة (يظهر للجميع)..."
                                                className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-50 shadow-inner"
                                                onKeyPress={async (e) => {
                                                    if (e.key === 'Enter' && e.target.value.trim()) {
                                                        await addDoc(getColRef(`messages_${monitoringRoom.id}`), { text: `[إعلان إداري]: ${e.target.value.trim()}`, type: 'system', sender: displayAppName, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Admin', role: 'SUPER_ADMIN', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), timeFull: Date.now() });
                                                        e.target.value = '';
                                                        showToast("تم إرسال الإعلان للغرفة", "success");
                                                    }
                                                }}
                                            />
                                            <button onClick={async () => {
                                                const input = document.getElementById('ghostMsgInput');
                                                if (input && input.value.trim()) {
                                                    await addDoc(getColRef(`messages_${monitoringRoom.id}`), { text: `[إعلان إداري]: ${input.value.trim()}`, type: 'system', sender: displayAppName, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Admin', role: 'SUPER_ADMIN', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), timeFull: Date.now() });
                                                    input.value = '';
                                                    showToast("تم إرسال الإعلان للغرفة", "success");
                                                }
                                            }} className="bg-indigo-600 text-white px-5 rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-md btn-press flex items-center gap-2"><Send size={18} /> إرسال</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {remoteActionUser && (
                        <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => setRemoteActionUser(null)}>
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden dialog-zoom-in" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-rose-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><AlertTriangle className="text-rose-500" /> إدارة العضو</h3>
                                    <button onClick={() => setRemoteActionUser(null)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-500 transition-colors"><X size={18} /></button>
                                </div>
                                <div className="flex items-center gap-4 mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <img src={remoteActionUser.avatar} className="w-14 h-14 rounded-full object-cover border-2 border-white shadow-sm" />
                                    <div>
                                        <h4 className="font-black text-slate-800">{remoteActionUser.name}</h4>
                                        <p className="text-[10px] text-slate-500 font-bold">{remoteActionUser.role}</p>
                                    </div>
                                </div>
                                <div className="space-y-4 relative z-10">
                                    <div className="flex flex-col gap-2">
                                        <input value={actionDuration} onChange={e => setActionDuration(e.target.value)} type="number" placeholder="المدة بالدقائق (0 للحظر الدائم)" className="w-full border-2 border-slate-100 bg-white rounded-xl p-3.5 font-bold text-sm outline-none focus:border-rose-400" />
                                        <input value={actionReason} onChange={e => setActionReason(e.target.value)} type="text" placeholder="سبب العقوبة (يظهر في السجل وللإدارة)" className="w-full border-2 border-slate-100 bg-white rounded-xl p-3.5 font-bold text-sm outline-none focus:border-rose-400" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => handleRemoteUserAction('BAN')} className="bg-rose-100 text-rose-700 py-3 rounded-xl font-black hover:bg-rose-200 transition-colors active:scale-95 flex justify-center items-center gap-2"><Ban size={18} /> حظر</button>
                                        <button onClick={() => handleRemoteUserAction('KICK')} className="bg-orange-100 text-orange-700 py-3 rounded-xl font-black hover:bg-orange-200 transition-colors active:scale-95 flex justify-center items-center gap-2"><UserMinus size={18} /> طرد</button>
                                        <button onClick={() => handleRemoteUserAction('MUTE')} className="col-span-2 bg-slate-200 text-slate-700 py-3 rounded-xl font-black hover:bg-slate-300 transition-colors active:scale-95 flex justify-center items-center gap-2"><MicOff size={18} /> كتم صوتي وكتابي</button>
                                    </div>
                                    <div className="border-t border-slate-100 pt-4 mt-2">
                                        <label className="text-[11px] font-black text-slate-500 block mb-2">إرسال تحذير / رسالة خاصة</label>
                                        <div className="flex gap-2">
                                            <input value={dmText} onChange={e => setDmText(e.target.value)} placeholder="اكتب رسالتك هنا..." className="flex-1 border-2 border-slate-100 bg-white rounded-xl p-3.5 font-bold text-sm outline-none focus:border-indigo-400" />
                                            <button onClick={() => handleRemoteUserAction('DM')} className="bg-indigo-600 text-white px-5 rounded-xl font-black hover:bg-indigo-700 transition-colors btn-press"><Send size={18} /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {editBanData && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => setEditBanData(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden dialog-zoom-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><Edit3 className="text-indigo-500" /> تعديل بيانات الحظر/الكتم</h3>
                                    <button onClick={() => setEditBanData(null)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><X size={18} /></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-slate-50 p-3 rounded-xl text-xs font-bold text-slate-500 border border-slate-100">
                                        العضو: <span className="text-slate-800">{editBanData.name}</span><br />
                                        الغرفة: <span className="text-indigo-600">{editBanData.roomName}</span>
                                    </div>
                                    <div><label className="text-[10px] font-extrabold text-slate-500 uppercase block mb-1">المدة المتبقية (دقائق - 0 للدائم)</label><input type="number" value={editBanData.duration} onChange={e => setEditBanData({ ...editBanData, duration: parseInt(e.target.value) || 0 })} className="w-full border-2 border-slate-100 bg-white rounded-xl p-3 font-bold outline-none focus:border-indigo-400 text-center" /></div>
                                    <div><label className="text-[10px] font-extrabold text-slate-500 uppercase block mb-1">السبب</label><input type="text" value={editBanData.reason} onChange={e => setEditBanData({ ...editBanData, reason: e.target.value })} className="w-full border-2 border-slate-100 bg-white rounded-xl p-3 font-bold outline-none focus:border-indigo-400" /></div>
                                    <button onClick={handleSaveEditedBan} className="w-full bg-indigo-600 text-white font-black py-3.5 rounded-xl shadow-lg hover:bg-indigo-700 transition-all btn-press mt-2">حفظ التعديلات</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {permissionModalUser && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => setPermissionModalUser(null)}>
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300 border border-slate-100" onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-purple-600 to-indigo-600 p-6 text-white text-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                    <ShieldCheck size={40} className="mx-auto mb-3 text-purple-200 drop-shadow-md" />
                                    <h2 className="text-2xl font-black relative z-10">إدارة صلاحيات المشرف</h2>
                                    <p className="text-sm font-bold text-purple-100 opacity-90 mt-1">{permissionModalUser.name}</p>
                                </div>
                                <div className="p-6 space-y-3 max-h-[50vh] overflow-y-auto custom-scrollbar">
                                    {Object.entries(GLOBAL_PERMISSIONS).map(([key, label]) => (
                                        <div key={key} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white transition-colors cursor-pointer group" onClick={() => togglePerm(key)}>
                                            <span className="font-bold text-sm text-slate-700 select-none">{label}</span>
                                            <div className={`w-12 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${tempPermissions[key] ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                                <div className={`w-5 h-5 bg-white rounded-full shadow-md absolute top-0.5 transition-all duration-300 ${tempPermissions[key] ? 'left-6' : 'left-0.5'}`}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 bg-slate-50 border-t border-slate-100 flex flex-wrap gap-3">
                                    <button onClick={savePermissions} className="flex-1 bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-500/30 hover:bg-purple-700 active:scale-95 transition-all min-w-[120px]">حفظ التعديلات</button>
                                    <button onClick={async () => {
                                        const newSups = { ...supervisors };
                                        delete newSups[permissionModalUser.id];
                                        try {
                                            await setDoc(getDocRef('sys_config', 'supervisors'), { list: newSups });
                                            showToast("تم سحب الإشراف بنجاح ❌", "success");
                                            setPermissionModalUser(null);
                                        } catch (e) { showToast("حدث خطأ", "error"); }
                                    }} className="flex-1 bg-rose-100 text-rose-600 border border-rose-200 py-4 rounded-2xl font-bold hover:bg-rose-200 active:scale-95 transition-all min-w-[120px]">سحب الإشراف</button>
                                    <button onClick={() => setPermissionModalUser(null)} className="w-full bg-white text-slate-600 border border-slate-200 py-3 rounded-2xl font-bold hover:bg-slate-100 active:scale-95 transition-all mt-1">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {appearanceUser && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => setAppearanceUser(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-6 relative overflow-hidden animate-in zoom-in-95 duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><Palette className="text-indigo-500" /> مظهر: {appearanceUser.name}</h2>
                                    <button onClick={() => setAppearanceUser(null)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-500 transition-colors"><X size={18} /></button>
                                </div>

                                <div className="space-y-5">
                                    <div className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer group" onClick={() => setAppearanceData({ ...appearanceData, isVip: !appearanceData.isVip })}>
                                        <div className="flex items-center gap-3"><Crown className={appearanceData.isVip ? "text-amber-500" : "text-slate-400"} size={20} /><span className="font-bold text-sm text-slate-700">ترقية لـ VIP (الملكي)</span></div>
                                        <div className={`w-12 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${appearanceData.isVip ? 'bg-amber-500' : 'bg-slate-300'}`}>
                                            <div className={`w-5 h-5 bg-white rounded-full shadow-md absolute top-0.5 transition-all duration-300 ${appearanceData.isVip ? 'left-6' : 'left-0.5'}`}></div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-extrabold text-slate-500 mb-2 block uppercase">شارة مخصصة بجانب الاسم (Emoji)</label>
                                        <input type="text" value={appearanceData.badge} onChange={e => setAppearanceData({ ...appearanceData, badge: e.target.value })} className="w-full border-2 border-slate-100 bg-slate-50 rounded-xl p-3.5 font-bold text-center text-xl outline-none focus:border-indigo-400 transition-all" placeholder="مثال: 🦅" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <label className="text-[10px] font-extrabold text-slate-500 mb-2 block text-center uppercase">لون الاسم</label>
                                            <div className="flex items-center justify-center bg-white p-2 rounded-xl border shadow-sm"><input type="color" value={appearanceData.customNameColor || '#1f2937'} onChange={(e) => setAppearanceData({ ...appearanceData, customNameColor: e.target.value })} className="w-8 h-8 rounded cursor-pointer border-0 p-0" /></div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <label className="text-[10px] font-extrabold text-slate-500 mb-2 block text-center uppercase">خلفية الرسالة</label>
                                            <div className="flex items-center justify-center bg-white p-2 rounded-xl border shadow-sm"><input type="color" value={appearanceData.customBgColor || '#ffffff'} onChange={(e) => setAppearanceData({ ...appearanceData, customBgColor: e.target.value })} className="w-8 h-8 rounded cursor-pointer border-0 p-0" /></div>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button onClick={saveAppearance} className="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all">حفظ التغييرات</button>
                                        <button onClick={() => { setAppearanceData({ customNameColor: '', customBgColor: '', badge: '', isVip: false }) }} className="px-4 bg-white border border-slate-200 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 active:scale-95 transition-all">تصفير</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {viewRoomAccounts && (
                        <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => { setViewRoomAccounts(null); setRoomAccountsList([]); }}>
                            <div className="bg-white w-full max-w-3xl rounded-[2.5rem] shadow-2xl p-6 md:p-8 relative overflow-hidden dialog-zoom-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><Key className="text-amber-500" /> حسابات وصلاحيات غرفة: {viewRoomAccounts.name}</h2>
                                    <button onClick={() => { setViewRoomAccounts(null); setRoomAccountsList([]); }} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-500 transition-colors"><X size={18} /></button>
                                </div>
                                <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                                    <table className="w-full text-sm text-right">
                                        <thead className="bg-slate-50 text-slate-500 font-extrabold text-xs uppercase tracking-widest border-b border-slate-100 sticky top-0 z-10">
                                            <tr><th className="px-4 py-3">الاسم (الحساب)</th><th className="px-4 py-3">كلمة السر</th><th className="px-4 py-3">الرتبة</th><th className="px-4 py-3">تاريخ الإضافة</th><th className="px-4 py-3">حذف</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 font-bold text-slate-700">
                                            {roomAccountsList.map((acc, idx) => (
                                                <tr key={acc.id} className="hover:bg-slate-50/50 transition-colors animate-in fade-in" style={{ animationDelay: `${idx * 15}ms` }}>
                                                    <td className="px-4 py-4 font-black text-indigo-600">{acc.username}</td>
                                                    <td className="px-4 py-4 font-mono text-rose-500">{acc.password}</td>
                                                    <td className="px-4 py-4">
                                                        <span className={`px-2.5 py-1 rounded-md text-[10px] ${acc.role === 'Master' ? 'bg-red-100 text-red-700' : (acc.role === 'Admin' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700')}`}>
                                                            {acc.role} {acc.isGlobal ? '(شامل)' : ''}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-4 text-xs text-slate-500" dir="ltr">{acc.addedAt ? new Date(acc.addedAt).toLocaleString('en-GB', { hour12: true, month: 'short', day: 'numeric' }) : '-'}</td>
                                                    <td className="px-4 py-4">
                                                        <button onClick={() => {
                                                            openConfirmDialog("حذف حساب", `هل أنت متأكد من حذف حساب (${acc.username})؟`, async () => {
                                                                try { await deleteDoc(getDocRef(acc.isGlobal ? 'global_accounts' : `room_accounts_${viewRoomAccounts.id}`, acc.id)); showToast("تم حذف الحساب بنجاح", "success"); }
                                                                catch (e) { showToast("حدث خطأ", "error"); }
                                                            }, true);
                                                        }} className="p-2 bg-rose-50 text-rose-500 hover:bg-rose-100 rounded-lg transition-colors"><Trash2 size={16} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {roomAccountsList.length === 0 && <tr><td colSpan="5" className="px-4 py-12 text-center text-slate-400 font-bold border-2 border-dashed border-slate-100 rounded-2xl m-2">لا توجد حسابات مسجلة لهذه الغرفة</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {actionDialog && (
                        <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4 animate-in fade-in" onClick={() => setActionDialog(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden dialog-zoom-in" onClick={e => e.stopPropagation()}>
                                <div className={`w-20 h-20 mx-auto rounded-3xl flex items-center justify-center mb-6 rotate-3 border-4 border-white shadow-lg ${actionDialog.needsInput ? 'bg-indigo-500 text-white shadow-indigo-500/40' : 'bg-rose-500 text-white shadow-rose-500/40'}`}>
                                    {actionDialog.needsInput ? <Settings size={36} className="-rotate-3" /> : <AlertTriangle size={36} className="-rotate-3" />}
                                </div>
                                <h3 className="text-2xl font-black text-center text-slate-800 mb-3">{actionDialog.title}</h3>
                                <p className="text-center text-slate-500 text-sm mb-8 font-bold leading-relaxed">{actionDialog.desc}</p>

                                {actionDialog.needsInput && (
                                    <div className="mb-6 space-y-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase">{actionDialog.inputLabel || "أدخل القيمة"}</label>
                                            <input type="text" value={actionDialog.inputValue} onChange={e => setActionDialog({ ...actionDialog, inputValue: e.target.value })} className="w-full border-2 border-gray-100 p-3 rounded-xl font-bold text-center mt-1 outline-none focus:border-indigo-400" autoFocus />
                                        </div>
                                        {actionDialog.needsReason && (
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-500 uppercase">السبب (للتسجيل)</label>
                                                <input type="text" value={actionDialog.inputReason} onChange={e => setActionDialog({ ...actionDialog, inputReason: e.target.value })} className="w-full border-2 border-gray-100 p-3 rounded-xl font-bold text-center mt-1 outline-none focus:border-rose-400" placeholder="مثال: مخالفة قوانين" />
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="flex gap-3">
                                    <button onClick={() => { actionDialog.onConfirm(actionDialog.inputValue, actionDialog.inputReason); setActionDialog(null); }} className={`flex-1 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all ${actionDialog.needsInput ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-500/30' : 'bg-rose-600 hover:bg-rose-700 shadow-rose-500/30'}`}>نعم، متأكد</button>
                                    <button onClick={() => setActionDialog(null)} className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all">تراجع</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* نافذة الرسائل محذوفة - التطبيق مستقل */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
