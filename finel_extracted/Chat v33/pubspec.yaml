name: jordan_audio_forum
description: Jordan Audio Forum - Live Audio Rooms App
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # State Management
  provider: ^6.1.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # HTTP (Cloudinary upload)
  http: ^1.2.1

  # Navigation
  go_router: ^13.2.0

  # UI & Utils
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.2.3
  agora_rtc_engine: ^6.5.3
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # - assets/images/
