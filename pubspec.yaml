name: lqana_jordan_chat
description: لقانا الأردن شات - النسخة الملكية
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.10

  # Agora RTC - صوت الغرفة
  agora_rtc_engine: ^6.3.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Media
  image_picker: ^1.0.7

  # Utils
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  http: ^1.2.1
  webview_flutter: ^4.4.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/html/
  # خط Cairo يُحمَّل عبر google_fonts (لا حاجة لملفات .ttf داخل الـ zip — يصلح رفع FlutLab)
