                                                <label className="flex items-center gap-3 text-sm font-bold text-[#333333] cursor-pointer w-fit"><input type="radio" checked={roomState.roomLockState === 'gate'} onChange={() => updateRoomSetting('roomLockState', 'gate')} className="w-4 h-4 accent-[#808080]"/> بوابة دخول</label>
                                            </div>
                                            <div className="space-y-2 mt-4">
                                                <h4 className="text-sm font-bold text-[#333333] border-b border-gray-200 pb-1">الصور</h4>
                                                <label className="flex items-center gap-3 text-sm font-bold text-[#333333] cursor-pointer w-fit"><input type="checkbox" checked={roomState.allowPublicImages !== false} onChange={e => updateRoomSetting('allowPublicImages', e.target.checked)} className="w-4 h-4 accent-[#009688]"/> السماح بارسال الصور على النص العام</label>
                                            </div>
                                            <div className="space-y-2 mt-4 mb-4">
                                                <h4 className="text-sm font-bold text-[#333333] border-b border-gray-200 pb-1">صلاحيات الماستر</h4>
                                                <label className="flex items-center gap-3 text-sm font-bold text-[#333333] cursor-pointer w-fit"><input type="checkbox" checked={roomState.allowAddingMasters !== false} onChange={e => updateRoomSetting('allowAddingMasters', e.target.checked)} className="w-4 h-4 accent-[#808080]"/> السماح باضافة اسماء ماستر</label>
                                                <label className="flex items-center gap-3 text-sm font-bold text-[#333333] cursor-pointer w-fit"><input type="checkbox" checked={roomState.allowMastersToChangeSettings} onChange={e => updateRoomSetting('allowMastersToChangeSettings', e.target.checked)} className="w-4 h-4 accent-[#808080]"/> السماح لاسماء الماستر بتغيير الاعدادات</label>
                                            </div>
                                        </div>
                                    </div>
                                )}

                            {/* 4. Security Tab (الضوابط والأمان) */}
                            {adminTab === 'security' && hasPermission('roomSettings') && (
                                <div className="flex flex-col animate-in fade-in duration-200 pb-6 p-4 space-y-4">
                                    <div className="flex items-center justify-between p-3 bg-[#F5F5F5] rounded-2xl border border-[#D3D3D3] hover:border-[#808080] transition-colors cursor-pointer" onClick={() => updateRoomSetting('isChatLocked', !roomState.isChatLocked)}>
                                        <div><span className="font-bold text-sm text-[#333333] block">قفل الشات للجميع</span><span className="text-[10px] text-[#808080] font-bold">منع إرسال الرسائل</span></div>
                                        <input type="checkbox" checked={roomState.isChatLocked} readOnly className="w-5 h-5 accent-[#333333] pointer-events-none"/>
                                    </div>

                                    </div>
                                </div>

                                <div onClick={() => { if(liveProfileUser.id === currentUser.id) openConfirmDialog('النبذة الشخصية', 'اكتب النبذة:', val => updateProfileDataModal('bio', val), true, liveProfileUser.bio, 'النبذة'); }} className={`w-full min-h-[50px] bg-black/30 border border-white/10 rounded-lg flex items-center justify-center p-3 text-center text-white text-[13px] leading-relaxed cursor-pointer hover:bg-black/40 transition-colors relative shadow-inner ${liveProfileUser.id === currentUser.id ? 'cursor-pointer' : ''}`}>

                                        <button onClick={() => { setShowRoomMenu(false); onOpenSettings(); }} className="p-3.5 hover:bg-gray-50 flex items-center gap-3 border-b border-gray-200 transition-colors text-gray-700"><Settings size={18}/> الإعدادات</button>

                                    </div>
                                </div>
                            </div>

                                </div>
                            </div>

                                <div className="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl p-7 relative overflow-hidden" onClick={e => e.stopPropagation()}>
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-full blur-3xl -z-10 -mr-10 -mt-10"></div>
                                    <div className="absolute bottom-0 left-0 w-32 h-32 bg-rose-50 rounded-full blur-3xl -z-10 -ml-10 -mb-10"></div>

                                    <div className={`w-20 h-20 ${actionDialog.needsInput ? 'bg-indigo-50 text-indigo-500 shadow-indigo-100' : 'bg-red-50 text-red-500 shadow-red-100'} rounded-3xl shadow-lg flex items-center justify-center mx-auto mb-6 rotate-3 border-2 border-white transform transition-transform hover:scale-110 hover:rotate-6`}>
                                        {actionDialog.needsInput ? <Settings size={36} className="-rotate-3"/> : <AlertCircle size={36} className="-rotate-3"/>}
                                    </div>
                                    <h3 className="text-2xl font-black text-center text-gray-800 mb-3 relative z-10">{actionDialog.title}</h3>
                                    <p className="text-center text-gray-500 text-sm mb-6 leading-relaxed relative z-10 font-medium">{actionDialog.desc}</p>

                                    {actionDialog.needsInput && (
                                        <div className="mb-7 relative z-10 space-y-4">
                                            <div>
                                                <label className="block text-[11px] font-extrabold text-gray-400 mb-2 uppercase tracking-wider">{actionDialog.inputLabel}</label>
                                                <div className="relative">
                                                    {actionDialog.inputLabel.includes('النبذة') || actionDialog.inputLabel.includes('شكواك') ? (
                                                        <textarea
                                                            value={actionDialog.inputValue}
                                                            onChange={(e) => setActionDialog({...actionDialog, inputValue: e.target.value})}
                                                            className="w-full bg-white border-2 border-gray-100 rounded-2xl p-4 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 text-right font-bold text-sm text-indigo-700 transition-all shadow-sm resize-none h-24"
                                                            placeholder="..."
                                                            autoFocus
                                                        ></textarea>
                                                    ) : (
                                                        <input
                                                            type="text"
                                                            value={actionDialog.inputValue}
                                                            onChange={(e) => setActionDialog({...actionDialog, inputValue: e.target.value})}
                                                            className="w-full bg-white border-2 border-gray-100 rounded-2xl p-4 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 text-center font-black text-xl text-indigo-700 transition-all shadow-sm"
                                                            autoFocus
                                                        />
                                                    )}
                                                </div>
                                            </div>

                                            {/* خانة الإدخال الثانية المخصصة للسبب */}
                                            {actionDialog.needsReason && (
                                                <div>
                                                    <label className="block text-[11px] font-extrabold text-gray-400 mb-2 uppercase tracking-wider">سبب الإجراء (يظهر في تقارير الإدارة)</label>
                                                    <input
                                                        type="text"
                                                        value={actionDialog.inputReason}
                                                        onChange={(e) => setActionDialog({...actionDialog, inputReason: e.target.value})}
                                                        className="w-full bg-white border-2 border-gray-100 rounded-2xl p-4 outline-none focus:border-red-500 focus:ring-4 focus:ring-red-50 text-right font-bold text-sm text-red-600 transition-all shadow-sm"
                                                        placeholder="اكتب السبب هنا (مخالفة، شتائم...)"
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="flex gap-3 relative z-10">
                                        <button
                                            onClick={() => {
                                                // تمرير القيمتين: الإدخال الأول (المدة) والإدخال الثاني (السبب)
                                                actionDialog.onConfirm(actionDialog.inputValue, actionDialog.inputReason);
                                                setActionDialog(null);
                                            }}
                                            className={`flex-1 text-white font-extrabold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.97] flex justify-center items-center gap-2 ${actionDialog.needsInput ? 'bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 shadow-indigo-500/30' : 'bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 shadow-red-500/30'}`}
                                        >
                                            {actionDialog.needsInput ? <CheckCircle size={18}/> : <Trash2 size={18}/>} تأكيد الإجراء
                                        </button>
                                        <button
                                            onClick={() => setActionDialog(null)}
                                            className="flex-1 bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 font-bold py-4 rounded-2xl transition-all active:scale-[0.97] shadow-sm"
                                        >
                                            إلغاء الأمر
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </>
                )}

                {currentModal === 'about' && (
                    <div className="fixed inset-0 z-[250] bg-black/60 backdrop-blur-sm flex flex-col p-4 animate-in fade-in duration-300 justify-center items-center" onClick={()=>setCurrentModal('none')}>
                        <div className="bg-white rounded-xl w-full max-w-sm flex flex-col overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()}>
                            <div className="bg-nav-gradient text-white p-4 flex justify-between items-center"><h2 className="font-bold">عن البرنامج</h2><button onClick={()=>setCurrentModal('none')}><X size={20}/></button></div>
                            <div className="p-6 text-center space-y-4 text-sm font-bold text-gray-700">
                                <p>لقانا الأردن - النسخة الملكية الكلاسيكية 1.5.0</p>
                                <p>{TERMS_TEXT}</p>
                            </div>
                        </div>
                    </div>
                )}

                {loginModal && (
                    <div className="fixed inset-0 bg-black/70 z-[3000] flex items-center justify-center px-4 animate-in fade-in" onClick={()=>setLoginModal(false)}>
                        <div className="bg-[#48c4d3] w-full max-w-sm rounded-lg shadow-2xl overflow-hidden animate-in zoom-in-95" onClick={e=>e.stopPropagation()}>
                            <div className="flex justify-around items-center pt-4 pb-2 px-2 border-b border-white/20">
                                <button onClick={()=>setLoginTab('registered')} className={`px-6 py-1.5 text-sm font-bold transition-colors ${loginTab==='registered'?'bg-white text-black rounded-full shadow':'text-white'}`}>مسجل</button>
                                <button onClick={()=>setLoginTab('member')} className={`px-6 py-1.5 text-sm font-bold transition-colors ${loginTab==='member'?'bg-white text-black rounded-full shadow':'text-white'}`}>عضو</button>
                                <button onClick={()=>setLoginTab('guest')} className={`px-6 py-1.5 text-sm font-bold transition-colors ${loginTab==='guest'?'bg-white text-black rounded-full shadow':'text-white'}`}>زائر</button>
                            </div>
                            <div className="p-6 space-y-4">
                                <div className="bg-white rounded-full flex items-center p-1 shadow-inner relative" dir="ltr">
                                    <div className="bg-yellow-200 rounded-full w-8 h-8 flex items-center justify-center ml-1"><User size={16} className="text-yellow-700"/></div>
                                    <input type="text" value={loginData.username} onChange={e=>setLoginData({...loginData, username: e.target.value})} className="flex-1 text-center outline-none text-lg font-bold text-gray-800 bg-transparent" placeholder="" dir="rtl"/>
                                    <div className="bg-[#48c4d3] rounded-full w-8 h-8 flex items-center justify-center mr-1 text-white shadow"><ChevronDown size={18}/></div>
                                </div>
                                {loginTab !== 'guest' && (
                                    <div className="bg-white rounded-full flex items-center p-1 shadow-inner relative animate-in slide-in-from-top-2" dir="ltr">
                                        <div className="bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center ml-1"><Key size={16} className="text-gray-600"/></div>
                                        <input type="password" value={loginData.password} onChange={e=>setLoginData({...loginData, password: e.target.value})} className="flex-1 text-center outline-none text-lg font-bold text-gray-800 bg-transparent font-mono" placeholder={loginTab === 'member' ? "كلمة المرور (اختياري للزوار)" : ""}/>
                                    </div>
                                )}
                                <div className="flex justify-between items-center pt-2">
                                    <button className="flex items-center gap-1.5 text-[#004d40] font-bold text-sm"><SaveIcon size={18}/> حفظ</button>
                                    <div className="flex gap-2">
                                        <button onClick={() => setLoginModal(false)} className="bg-[#ff6b6b] text-white px-5 py-1.5 rounded-full font-bold shadow hover:bg-red-500 transition-transform active:scale-95">الغاء</button>
                                        <button onClick={handleModalLogin} disabled={isConnecting} className="bg-[#b2dfdb] text-teal-900 px-5 py-1.5 rounded-full font-bold shadow hover:bg-teal-200 transition-all active:scale-95 disabled:opacity-80 flex items-center justify-center min-w-[80px]">
                                            {isConnecting ? <span className="animate-pulse">جاري...</span> : 'دخول'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* الإعدادات تفتح فوق الغرفة وفوق الصفحة الرئيسية */}
                {showSettings && <SettingsPage onClose={() => setShowSettings(false)} settings={settings} setSettings={setSettings}/>}

                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
